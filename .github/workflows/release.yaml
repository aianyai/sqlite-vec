name: "Release"
on:
  release:
    types: [published]
permissions:
  contents: read
jobs:
  build-linux-x86_64-extension:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/vendor.sh
      - run: make loadable static
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-linux-x86_64-extension
          path: dist/*
  build-linux-aarch64-extension:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/vendor.sh
      - run: make loadable static
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-linux-aarch64-extension
          path: dist/*
  build-macos-x86_64-extension:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/vendor.sh
      - run: make loadable static
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-macos-x86_64-extension
          path: dist/*
  build-macos-aarch64-extension:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/vendor.sh
      - run: make loadable static
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-macos-aarch64-extension
          path: dist/*
  build-windows-x86_64-extension:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: ./scripts/vendor.sh
        shell: bash
      - run: make sqlite-vec.h
      - run: mkdir dist
      - run: cl.exe /fPIC -shared /W4 /Ivendor/ /O2 /LD sqlite-vec.c -o dist/vec0.dll
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-windows-x86_64-extension
          path: dist/*
  # New: Windows ARM64. Same as the x86_64 job, but msvc-dev-cmd `arch: arm64`
  # cross-targets aarch64 from the x64 host, so cl.exe emits an arm64 vec0.dll.
  build-windows-aarch64-extension:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: ./scripts/vendor.sh
        shell: bash
      - run: make sqlite-vec.h
      - run: mkdir dist
      - run: cl.exe /fPIC -shared /W4 /Ivendor/ /O2 /LD sqlite-vec.c -o dist/vec0.dll
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-windows-aarch64-extension
          path: dist/*
  publish-npm:
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86_64-extension
      - build-linux-aarch64-extension
      - build-macos-x86_64-extension
      - build-macos-aarch64-extension
      - build-windows-x86_64-extension
      - build-windows-aarch64-extension
    environment:
      name: release
    permissions:
      contents: read
      id-token: write # OIDC: npm Trusted Publishing (no NODE_AUTH_TOKEN needed)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-linux-x86_64-extension
          path: dist/linux-x86_64
      - uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-linux-aarch64-extension
          path: dist/linux-aarch64
      - uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-macos-x86_64-extension
          path: dist/macos-x86_64
      - uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-macos-aarch64-extension
          path: dist/macos-aarch64
      - uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-windows-x86_64-extension
          path: dist/windows-x86_64
      - uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-windows-aarch64-extension
          path: dist/windows-aarch64
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # OIDC Trusted Publishing needs npm >= 11.5.0; node 24's bundled npm may be older.
      - run: npm install -g npm@latest
      - name: Build npm packages
        run: VERSION=$(cat VERSION) node scripts/pack-npm.mjs
      - name: Publish to npm (OIDC Trusted Publishing)
        run: |
          VERSION=$(cat VERSION)
          if echo "$VERSION" | grep -q "alpha"; then
            TAG=alpha
          elif echo "$VERSION" | grep -q "beta"; then
            TAG=beta
          else
            TAG=latest
          fi
          for pkg in npm-out/@aiany/*; do
            echo "publishing $pkg"
            npm publish --provenance --access public --tag "$TAG" "$pkg"
          done
