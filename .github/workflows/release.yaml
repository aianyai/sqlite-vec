name: "Release"
on:
  release:
    types: [published]
permissions:
  contents: read
jobs:
  build-linux-x86_64-extension:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/vendor.sh
      - run: make loadable static
      - uses: actions/upload-artifact@v7
        with:
          name: sqlite-vec-linux-x86_64-extension
          path: dist/*
  build-linux-aarch64-extension:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/vendor.sh
      - run: make loadable static
      - uses: actions/upload-artifact@v7
        with:
          name: sqlite-vec-linux-aarch64-extension
          path: dist/*
  build-macos-x86_64-extension:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/vendor.sh
      - run: make loadable static
      - uses: actions/upload-artifact@v7
        with:
          name: sqlite-vec-macos-x86_64-extension
          path: dist/*
  build-macos-aarch64-extension:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/vendor.sh
      - run: make loadable static
      - uses: actions/upload-artifact@v7
        with:
          name: sqlite-vec-macos-aarch64-extension
          path: dist/*
  build-windows-x86_64-extension:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: ./scripts/vendor.sh
        shell: bash
      - run: make sqlite-vec.h
      - run: mkdir dist
      - run: cl.exe /fPIC -shared /W4 /Ivendor/ /O2 /LD sqlite-vec.c -o dist/vec0.dll
      - uses: actions/upload-artifact@v7
        with:
          name: sqlite-vec-windows-x86_64-extension
          path: dist/*
  # New: Windows ARM64. Same as the x86_64 job, but msvc-dev-cmd `arch: amd64_arm64`
  # selects the Hostx64\arm64 cross toolset, so the x64 runner's cl.exe emits an
  # arm64 vec0.dll. (Plain `arch: arm64` picks the arm64-HOSTED compiler, which is
  # not runnable on the x64 runner — fails with "cl.exe not recognized".)
  build-windows-aarch64-extension:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: ./scripts/vendor.sh
        shell: bash
      - run: make sqlite-vec.h
      - run: mkdir dist
      - run: cl.exe /fPIC -shared /W4 /Ivendor/ /O2 /LD sqlite-vec.c -o dist/vec0.dll
      - uses: actions/upload-artifact@v7
        with:
          name: sqlite-vec-windows-aarch64-extension
          path: dist/*
  publish-npm:
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86_64-extension
      - build-linux-aarch64-extension
      - build-macos-x86_64-extension
      - build-macos-aarch64-extension
      - build-windows-x86_64-extension
      - build-windows-aarch64-extension
    environment:
      name: release
    permissions:
      contents: read
      id-token: write # needed for OIDC Trusted Publishing and --provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: sqlite-vec-linux-x86_64-extension
          path: dist/linux-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: sqlite-vec-linux-aarch64-extension
          path: dist/linux-aarch64
      - uses: actions/download-artifact@v8
        with:
          name: sqlite-vec-macos-x86_64-extension
          path: dist/macos-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: sqlite-vec-macos-aarch64-extension
          path: dist/macos-aarch64
      - uses: actions/download-artifact@v8
        with:
          name: sqlite-vec-windows-x86_64-extension
          path: dist/windows-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: sqlite-vec-windows-aarch64-extension
          path: dist/windows-aarch64
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # OIDC Trusted Publishing needs npm >= 11.5.0; node 24's bundled npm may be older.
      - run: npm install -g npm@latest
      - name: Build npm packages
        run: VERSION=$(cat VERSION) node scripts/pack-npm.mjs
      - name: Publish to npm (OIDC Trusted Publishing)
        # Auth is via OIDC (npm Trusted Publishing) — no NODE_AUTH_TOKEN. Each
        # @aiany/sqlite-vec* package must have a trusted publisher configured on
        # npmjs.com (repo aianyai/sqlite-vec, workflow release.yaml, environment
        # release). Provenance is attached via the id-token permission above.
        run: |
          VERSION=$(cat VERSION)
          if echo "$VERSION" | grep -q "alpha"; then
            TAG=alpha
          elif echo "$VERSION" | grep -q "beta"; then
            TAG=beta
          else
            TAG=latest
          fi
          for pkg in npm-out/@aiany/*; do
            echo "publishing $pkg"
            npm publish --provenance --access public --tag "$TAG" "$pkg"
          done
